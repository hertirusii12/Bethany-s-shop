<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
</head>

<link rel="stylesheet" href="css/main.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<body>
    

<form>
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Email address</label>
    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
    <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
  </div>
  <div class="mb-3">
    <label for="exampleInputAdress" class="form-label">Password</label>
    <input type="password" class="form-control" id="exampleInputAdress">
  </div>
  <button type="submit" class="btn btn-primary" onclick="formValiddate()">Submit</button>

</form>



<!-- Forma -->
<form id="orderForm">
  <div class="mb-3">
    <label for="name" class="form-label">Name</label>
    <input type="text" class="form-control" id="name" required>
  </div>
  <div class="mb-3">
    <label for="email" class="form-label">Email</label>
    <input type="email" class="form-control" id="email" required>
  </div>
  <button type="button" class="btn btn-primary" id="previewBtn">Preview Order</button>
</form>

<!-- Modal -->
<div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Order Preview</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p><strong>Name:</strong> <span id="modalName"></span></p>
        <p><strong>Email:</strong> <span id="modalEmail"></span></p>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById("previewBtn").addEventListener("click", function() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    document.getElementById("modalName").textContent = name;
    document.getElementById("modalEmail").textContent = email;

    const modal = new bootstrap.Modal(document.getElementById("orderModal"));
    modal.show();
  });
</script>





<script>
function validateForm() {
  let email = document.getElementById("email").value.trim();
  let address = document.getElementById("address").value.trim();

  if (email === "" || address === "") {
    alert("Error: Email and Address cannot be empty!");
    return false; // prevent form submission
  } else {
    alert("Order submitted successfully!");
    return true; // allow form submission
  }
}
</script>


</body>
</html>
